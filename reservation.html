<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vacancia - Réservation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="reservation.css">
</head>

<body>

    <div class="res-card" id="reservationForm">
        <a href="index.html" class="back-home"><i class="fas fa-arrow-left me-2"></i> Retour à l'accueil</a>

        <h2 class="text-center mb-4" style="font-family: 'Playfair Display', serif;">Réserver votre Séjour</h2>

        <form>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="label-custom">Nom Complet</label>
                    <input type="text" class="form-control" id="Complet" name="Complet" placeholder="Votre nom">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="label-custom">Email</label>
                    <input type="email" class="form-control" id="Email" name="Email"  placeholder="exemple@mail.com">
                </div>
            </div>

            <div class="mb-3">
                <label class="label-custom">Destination</label>
                <select class="form-select" id="Destination" name="Destination">
                    <option selected>Choisir une ville...</option>
                    <option value="rabat">Rabat</option>
                    <option value="marrakech">Marrakech</option>
                    <option value="casablanca">Casablanca</option>
                    <option value="tanger">Tanger</option>
                </select>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="label-custom">Date d'arrivée</label>
                    <input type="date" class="form-control" id="date" name="date">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="label-custom">Nombre de personnes</label>
                    <input type="number" class="form-control" min="1" value="1">
                </div>
            </div>

            <button type="submit" class="btn btn-reserve w-100">CONFIRMER LA RÉSERVATION</button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Animation melli k-t-hll l-page
        gsap.from("#reservationForm", {
            duration: 1.2,
            y: 100,
            opacity: 0,
            ease: "power4.out"
        });

        gsap.from(".label-custom, .form-control, .form-select", {
            duration: 0.8,
            x: -20,
            opacity: 0,
            stagger: 0.1,
            delay: 0.5
        });
    </script>
</body>

</html>
